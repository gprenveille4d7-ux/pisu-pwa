<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PISU ACR</title>
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PISU ACR">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Prototype hors ligne</p>
      <h1>PISU ACR adulte</h1>
    </div>
    <button id="installBtn" class="ghost hidden">Installer</button>
  </header>

  <main>
    <section class="panel warning">
      <strong>Version test - à valider.</strong>
      <span>Ne pas utiliser comme protocole officiel sans validation médicale / institutionnelle.</span>
    </section>

    <section class="panel start-block">
  <div class="panel-title">
    <h2>Départ intervention</h2>
  </div>

  <div class="grid">
    <button data-action="Départ intervention" data-gps="true" class="action">
      Départ intervention
    </button>

    <button data-action="Arrivée sur les lieux" data-gps="true" class="action good">
      Arrivée sur les lieux
    </button>
  </div>
</section>

    <section class="panel identity-block">
      <div class="panel-title">
        <h2>Identité patient</h2>
      </div>

      <div class="identity-grid">
        <label>
          Nom / Prénom
          <input id="patientName" type="text" placeholder="Ex : Dupont Jean / Inconnu">
        </label>

        <label>
          Âge ou date de naissance
          <input id="patientAge" type="text" placeholder="Ex : 68 ans / 12-04-1958">
        </label>

        <label>
          Sexe
          <select id="patientSex">
            <option value="">Non renseigné</option>
            <option value="Homme">Homme</option>
            <option value="Femme">Femme</option>
            <option value="Indéterminé">Indéterminé</option>
          </select>
        </label>

        <label>
          Poids estimé
          <input id="patientWeight" type="text" inputmode="numeric" placeholder="Ex : 80 kg">
        </label>

        <label class="full-width">
          Remarque
          <textarea id="patientNote" rows="2" placeholder="Ex : identité confirmée par famille, papiers absents, bracelet patient..."></textarea>
        </label>
      </div>

      <div class="timer-actions">
        <button id="saveIdentityBtn" class="primary">Enregistrer identité</button>
        <button id="unknownIdentityBtn" class="secondary">Identité inconnue</button>
      </div>
    </section>

    <section class="panel protocols-block">
      <div class="panel-title">
        <h2>Protocole PISU</h2>
      </div>

      <div class="grid">
        <button data-action="Sélection protocole PISU : Arrêt cardiaque adulte" class="action danger">
          Arrêt cardiaque Adulte
        </button>

        <button data-action="Sélection protocole PISU : Arrêt cardiaque enfant" class="action danger">
          Arrêt Cardiaque Enfant
        </button>

        <button data-action="Sélection protocole PISU : Douleur thoracique" class="action protocol-chest">
          Douleur Thoracique
        </button>

        <button data-action="Sélection protocole PISU : Exposition aux fumées adulte et enfant" class="action protocol-smoke">
          Exposition aux fumées Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Brûlure adulte et enfant" class="action protocol-burn">
          Brûlure Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Convulsion adulte et enfant" class="action protocol-neuro">
          Convulsion Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Anaphylaxie adulte et enfant" class="action protocol-allergy">
          Anaphylaxie Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Hémorragie adulte et enfant" class="action protocol-bleed">
          Hémorragie Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Hypoglycémie adulte et enfant" class="action protocol-glucose">
          Hypoglycémie Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Exacerbation d’asthme ou BPCO adulte et enfant" class="action protocol-respiratory">
          Exacerbation d’asthme | BPCO Adulte & Enfant
        </button>

        <button data-action="Sélection protocole PISU : Antalgie adulte et enfant" class="action protocol-pain">
          Antalgie Adulte & Enfant
        </button>
      </div>

      <div class="protocol-footer">
        SAMU | SMUR Calvados.
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>Journal mission</h2>
        <button id="clearLog" class="ghost">Effacer</button>
      </div>
      <ol id="log"></ol>
    </section>

    <section class="export-actions">
      <button id="copyLog" class="secondary">Copier le journal</button>
      <button id="downloadLog" class="secondary">Exporter .txt</button>
    </section>
  </main>

  <footer>
    <span id="offlineStatus">Vérification hors ligne...</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
